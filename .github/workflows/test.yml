name: Test Project

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version:
          - "3.13"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install project dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Install development tools
        run: |
          pip install pytest
          pip install pytest-cov
          pip install black
          pip install isort
          pip install ruff

      - name: Run Black
        run: |
          black --check .

      - name: Run isort
        run: |
          isort --check-only .

      - name: Run Ruff
        run: |
          ruff check .

      - name: Run Unit Tests
        run: |
          pytest -v --cov=src --cov-report=term-missing