version: '3.8'

services:
  db:
    image: postgres:13
    ports:
      - "5435:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - ~/Desktop/Work/Domitory/db/db_data:/var/lib/postgresql/data
    container_name: database